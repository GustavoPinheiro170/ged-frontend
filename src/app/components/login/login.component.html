<div class="login-container">
  <p style="text-align: center; color: #777; margin-bottom: 20px">
    Acesse o sistema de documentos
  </p>

  <div class="img-logo">
  <img [src]="'assets/images/logo-ged.png'" width="280" height="220" alt="Logo GED">
  </div>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Username</label>

      <input
        type="text"
        formControlName="username"
        placeholder="Digite seu usuário"
      />

      <div
        class="error"
        *ngIf="
          loginForm.get('username')?.invalid &&
          loginForm.get('username')?.touched
        "
      >
        Usuário é obrigatório
      </div>
    </div>

    <div class="form-group">
      <label>Senha</label>

      <input
        type="password"
        formControlName="password"
        placeholder="Digite sua senha"
      />

      <div
        class="error"
        *ngIf="
          loginForm.get('password')?.invalid &&
          loginForm.get('password')?.touched
        "
      >
        Senha obrigatória
      </div>
    </div>

    <button type="submit" [disabled]="loginForm.invalid">Entrar</button>
  </form>
</div>
